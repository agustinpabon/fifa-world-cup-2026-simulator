openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: oracle
    description: World Cup Oracle simulation endpoints
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /oracle/status:
    get:
      operationId: getOracleStatus
      tags: [oracle]
      summary: Get oracle initialization status
      description: Returns whether the Elo ratings and simulation are ready
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OracleStatus"

  /oracle/teams:
    get:
      operationId: getTeams
      tags: [oracle]
      summary: Get all 48 World Cup teams with Elo ratings
      description: Returns sorted list of all qualified teams and their computed Elo ratings
      responses:
        "200":
          description: Teams list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamsResponse"

  /oracle/squads:
    get:
      operationId: getSquads
      tags: [oracle]
      summary: Get versioned local World Cup squad snapshots
      description: Returns the local squad snapshot with per-team completeness and provenance metadata.
      responses:
        "200":
          description: Squads snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SquadsResponse"

  /oracle/simulation:
    get:
      operationId: getSimulation
      tags: [oracle]
      summary: Get Monte Carlo simulation results
      description: Returns pre-computed tournament simulation probabilities for all teams
      parameters:
        - name: seed
          in: query
          required: false
          description: Optional seed for an ad hoc reproducible simulation response. Omit it to use the cached seed.
          schema:
            type: string
            minLength: 1
            maxLength: 128
      responses:
        "200":
          description: Simulation results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulationResponse"
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /oracle/predict-match:
    post:
      operationId: predictMatch
      tags: [oracle]
      summary: Predict a head-to-head match
      description: Given two team names, returns win/draw/loss probabilities, expected goals, and most likely scoreline
      parameters:
        - name: experimentalModifiers
          in: query
          required: false
          description: Explicit opt-in flag for experimental context modifiers. Defaults to false.
          schema:
            type: boolean
            default: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MatchPredictionRequest"
      responses:
        "200":
          description: Match prediction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchPredictionResponse"
        "400":
          description: Invalid team names or malformed JSON
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /oracle/live-match:
    post:
      operationId: recordLiveMatch
      tags: [oracle]
      summary: Record a manual scenario override
      description: Records a manual match score override in-memory and queues simulation recalculation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LiveMatchRequest"
      responses:
        "200":
          description: Manual override recorded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveMatchResponse"
        "400":
          description: Invalid inputs or malformed JSON
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteLiveMatch
      tags: [oracle]
      summary: Remove a manual scenario override
      description: Removes a manual match score override in-memory and queues simulation recalculation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteLiveMatchRequest"
      responses:
        "200":
          description: Manual override deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteLiveMatchResult"
        "400":
          description: Invalid inputs or malformed JSON
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /oracle/live-matches:
    get:
      operationId: getLiveMatches
      tags: [oracle]
      summary: List imported fixtures and manual scenario overrides
      description: Returns the imported fixture list plus any in-memory manual scenario overrides
      responses:
        "200":
          description: Imported fixtures and manual overrides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveMatchesResponse"

  /oracle/match-context:
    get:
      operationId: getMatchContext
      tags: [oracle]
      summary: Get fixture context with optional Open-Meteo weather
      description: Returns fixture metadata, resolved venue coordinates, and weather context when the kickoff is inside the forecast horizon.
      parameters:
        - name: homeTeam
          in: query
          required: true
          description: Home team name for the scheduled fixture lookup.
          schema:
            type: string
            minLength: 1
        - name: awayTeam
          in: query
          required: true
          description: Away team name for the scheduled fixture lookup.
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Fixture context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchContextResponse"
        "400":
          description: Invalid or unknown teams
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No scheduled fixture exists for the requested teams
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /oracle/live-matches/clear:
    post:
      operationId: clearLiveMatches
      tags: [oracle]
      summary: Clear all manual scenario overrides
      description: Clears all in-memory manual score overrides and queues simulation recalculation
      responses:
        "200":
          description: All manual scenario overrides cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClearLiveMatchesResult"
        "400":
          description: Malformed JSON
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/HealthStatusData"
      required:
        - data

    HealthStatusData:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    OracleStatus:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/OracleStatusData"
        meta:
          $ref: "#/components/schemas/OracleResponseMeta"
      required:
        - data
        - meta

    OracleStatusData:
      type: object
      properties:
        state:
          type: string
          enum: [loading, ready, error]
        ready:
          type: boolean
        matchesLoaded:
          type: integer
        teamsRated:
          type: integer
        simulationsRun:
          type: integer
        simulationSeed:
          type: string
        liveMatchesRecorded:
          type: integer
        liveDataProvider:
          type: string
          enum: [espn, disabled]
        liveDataMatchesLoaded:
          type: integer
        liveDataLastSyncedAt:
          type: string
          nullable: true
        liveDataError:
          type: string
          nullable: true
        eliminatedTeams:
          type: array
          items:
            type: string
        recalculating:
          type: boolean
          description: True when a recalculation job is pending or running.
        lastUpdated:
          type: string
          nullable: true
          description: ISO timestamp for the last successfully published simulation.
        recalculationError:
          type: string
          nullable: true
          description: Last simulation recalculation error, if the latest job failed.
        dataset:
          allOf:
            - $ref: "#/components/schemas/HistoricalDatasetMetadata"
          nullable: true
        error:
          $ref: "#/components/schemas/OracleLoadError"
        activeModel:
          type: string
          enum:
            [
              elo-baseline,
              elo-poisson,
              elo-poisson-dixon-coles,
              elo-poisson-strength,
              elo-poisson-strength-dixon-coles,
            ]
        message:
          type: string
      required:
        - state
        - ready
        - matchesLoaded
        - teamsRated
        - simulationsRun
        - simulationSeed
        - liveMatchesRecorded
        - liveDataProvider
        - liveDataMatchesLoaded
        - liveDataLastSyncedAt
        - liveDataError
        - eliminatedTeams
        - recalculating
        - lastUpdated
        - recalculationError
        - dataset
        - activeModel
        - message

    OracleResponseMeta:
      type: object
      properties:
        readiness:
          $ref: "#/components/schemas/OracleReadiness"
      required:
        - readiness

    OracleReadiness:
      type: object
      properties:
        state:
          type: string
          enum: [loading, ready, error]
        ready:
          type: boolean
        message:
          type: string
        error:
          $ref: "#/components/schemas/OracleLoadError"
      required:
        - state
        - ready
        - message

    HistoricalDatasetMetadata:
      type: object
      properties:
        source:
          type: string
          enum: [remote, snapshot]
        date:
          type: string
          description: Latest completed match date included in the loaded dataset.
        hash:
          type: string
          description: SHA-256 hash of the raw CSV used for this runtime.
        loadedAt:
          type: string
        remoteUrl:
          type: string
        fallbackReason:
          type: string
      required:
        - source
        - date
        - hash
        - loadedAt

    OracleLoadError:
      type: object
      properties:
        code:
          type: string
          enum: [HISTORICAL_DATA_LOAD_FAILED]
        message:
          type: string
      required:
        - code
        - message

    Team:
      type: object
      properties:
        name:
          type: string
        code:
          type: string
        elo:
          type: number
        group:
          type: string
        flagEmoji:
          type: string
        attackStrength:
          type: number
        defenseStrength:
          type: number
      required:
        - name
        - code
        - elo
        - group
        - flagEmoji
        - attackStrength
        - defenseStrength

    TeamsResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/TeamsData"
        meta:
          $ref: "#/components/schemas/OracleResponseMeta"
      required:
        - data
        - meta

    TeamsData:
      type: object
      properties:
        teams:
          type: array
          items:
            $ref: "#/components/schemas/Team"
      required:
        - teams

    SnapshotProvenance:
      type: object
      properties:
        sourceName:
          type: string
        sourceUrl:
          type: string
        sourceTitle:
          type: string
        publishedDate:
          type: string
        accessedDate:
          type: string
        notes:
          type: array
          items:
            type: string
      required:
        - sourceName
        - sourceUrl
        - sourceTitle
        - publishedDate
        - accessedDate
        - notes

    SquadsResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/SquadsData"
        meta:
          $ref: "#/components/schemas/OracleResponseMeta"
      required:
        - data
        - meta

    SquadsData:
      type: object
      properties:
        schemaVersion:
          type: integer
        version:
          type: string
        competition:
          type: string
        provenance:
          $ref: "#/components/schemas/SnapshotProvenance"
        externalProvenance:
          $ref: "#/components/schemas/SquadsExternalProvenance"
        squads:
          type: array
          items:
            $ref: "#/components/schemas/TeamSquad"
      required:
        - schemaVersion
        - version
        - competition
        - provenance
        - externalProvenance
        - squads

    SquadsExternalProvenance:
      type: object
      properties:
        provider:
          type: string
          enum: [local-snapshot, api-football]
        loadedAt:
          type: string
          nullable: true
        sourceEndpoint:
          type: string
        cacheTtlMs:
          type: integer
          nullable: true
        stale:
          type: boolean
        error:
          type: string
          nullable: true
        state:
          type: string
          enum: [disabled, idle, fresh, stale, error]
        fallback:
          type: string
          enum: [none, stale-cache, local-data]
      required:
        - provider
        - loadedAt
        - sourceEndpoint
        - cacheTtlMs
        - stale
        - error
        - state
        - fallback

    TeamSquadCompletenessStatus:
      type: string
      enum: [complete, incomplete]

    TeamSquadCompleteness:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/TeamSquadCompletenessStatus"
        expectedPlayerCount:
          type: integer
        playerCount:
          type: integer
        notes:
          type: array
          items:
            type: string
      required:
        - status
        - expectedPlayerCount
        - playerCount
        - notes

    TeamSquadPlayer:
      type: object
      properties:
        name:
          type: string
        position:
          type: string
        shirtNumber:
          type: integer
        club:
          type: string
        source:
          $ref: "#/components/schemas/SnapshotProvenance"
      required:
        - name
        - position
        - source

    TeamSquad:
      type: object
      properties:
        team:
          type: string
        code:
          type: string
        group:
          type: string
        flagEmoji:
          type: string
        completeness:
          $ref: "#/components/schemas/TeamSquadCompleteness"
        source:
          $ref: "#/components/schemas/SnapshotProvenance"
        players:
          type: array
          items:
            $ref: "#/components/schemas/TeamSquadPlayer"
      required:
        - team
        - code
        - group
        - flagEmoji
        - completeness
        - source
        - players

    TeamSimResult:
      type: object
      properties:
        name:
          type: string
        code:
          type: string
        group:
          type: string
        flagEmoji:
          type: string
        elo:
          type: number
        titlePct:
          type: number
        finalPct:
          type: number
        semiFinalPct:
          type: number
        quarterFinalPct:
          type: number
        roundOf16Pct:
          type: number
        groupWinPct:
          type: number
        groupAdvancePct:
          type: number
        eliminated:
          type: boolean
        uncertainty:
          $ref: "#/components/schemas/TeamSimUncertainty"
      required:
        - name
        - code
        - group
        - flagEmoji
        - elo
        - titlePct
        - finalPct
        - semiFinalPct
        - quarterFinalPct
        - roundOf16Pct
        - groupWinPct
        - groupAdvancePct
        - eliminated
        - uncertainty

    ProbabilityUncertainty:
      type: object
      description: Binomial Monte Carlo uncertainty for a displayed probability percentage.
      properties:
        standardErrorPct:
          type: number
          description: Standard error in percentage points.
        confidenceIntervalLowPct:
          type: number
          description: Lower bound of the approximate confidence interval in percentage points.
        confidenceIntervalHighPct:
          type: number
          description: Upper bound of the approximate confidence interval in percentage points.
      required:
        - standardErrorPct
        - confidenceIntervalLowPct
        - confidenceIntervalHighPct

    TeamSimUncertainty:
      type: object
      properties:
        titlePct:
          $ref: "#/components/schemas/ProbabilityUncertainty"
        finalPct:
          $ref: "#/components/schemas/ProbabilityUncertainty"
        semiFinalPct:
          $ref: "#/components/schemas/ProbabilityUncertainty"
        quarterFinalPct:
          $ref: "#/components/schemas/ProbabilityUncertainty"
        roundOf16Pct:
          $ref: "#/components/schemas/ProbabilityUncertainty"
        groupWinPct:
          $ref: "#/components/schemas/ProbabilityUncertainty"
        groupAdvancePct:
          $ref: "#/components/schemas/ProbabilityUncertainty"
      required:
        - titlePct
        - finalPct
        - semiFinalPct
        - quarterFinalPct
        - roundOf16Pct
        - groupWinPct
        - groupAdvancePct

    SimulationUncertaintyMetadata:
      type: object
      properties:
        method:
          type: string
          enum: [binomial_standard_error]
        confidenceLevel:
          type: number
        zScore:
          type: number
        maxStandardErrorPct:
          type: number
          description: Largest possible standard error in percentage points for this simulation count.
        description:
          type: string
      required:
        - method
        - confidenceLevel
        - zScore
        - maxStandardErrorPct
        - description

    SimulationResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/SimulationData"
        meta:
          $ref: "#/components/schemas/OracleResponseMeta"
      required:
        - data
        - meta

    SimulationData:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/TeamSimResult"
        simulationsRun:
          type: integer
        simulationSeed:
          type: string
        liveMatchesRecorded:
          type: integer
        eliminatedTeams:
          type: array
          items:
            type: string
        uncertainty:
          $ref: "#/components/schemas/SimulationUncertaintyMetadata"
      required:
        - results
        - simulationsRun
        - simulationSeed
        - liveMatchesRecorded
        - eliminatedTeams
        - uncertainty

    MatchPredictionRequest:
      type: object
      additionalProperties: false
      properties:
        homeTeam:
          type: string
          minLength: 1
        awayTeam:
          type: string
          minLength: 1
        neutral:
          type: boolean
          description: Whether the match is played at a neutral venue. Defaults to true when omitted.
        isHomeA:
          type: boolean
          description: Whether Team 1 receives host/home context. Defaults to false when omitted.
        isHomeB:
          type: boolean
          description: Whether Team 2 receives host/home context. Defaults to false when omitted.
      required:
        - homeTeam
        - awayTeam

    MatchPredictionResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/MatchPredictionData"
        meta:
          $ref: "#/components/schemas/OracleResponseMeta"
      required:
        - data
        - meta

    MatchPredictionData:
      type: object
      properties:
        homeTeam:
          type: string
        awayTeam:
          type: string
        homeWinPct:
          type: number
        drawPct:
          type: number
        awayWinPct:
          type: number
        homeExpectedGoals:
          type: number
        awayExpectedGoals:
          type: number
        mostLikelyScore:
          type: string
        homeElo:
          type: number
        awayElo:
          type: number
        homeAttackStrength:
          type: number
        homeDefenseStrength:
          type: number
        awayAttackStrength:
          type: number
        awayDefenseStrength:
          type: number
        experimentalModifiers:
          $ref: "#/components/schemas/MatchContextModifiersReport"
      required:
        - homeTeam
        - awayTeam
        - homeWinPct
        - drawPct
        - awayWinPct
        - homeExpectedGoals
        - awayExpectedGoals
        - mostLikelyScore
        - homeElo
        - awayElo
        - homeAttackStrength
        - homeDefenseStrength
        - awayAttackStrength
        - awayDefenseStrength
        - experimentalModifiers

    MatchContextModifierProvenance:
      type: object
      properties:
        source:
          type: string
        sourceId:
          type: string
        sourceUrl:
          type: string
        retrievedAt:
          type: string
        notes:
          type: array
          items:
            type: string
      required:
        - source

    MatchContextModifierAdjustment:
      type: object
      properties:
        eloDelta:
          type: number
        xgDelta:
          type: number
        xgMultiplier:
          type: number
      required:
        - eloDelta
        - xgDelta
        - xgMultiplier

    AppliedMatchContextModifier:
      type: object
      properties:
        kind:
          type: string
          enum: [weather, availability, suspension, manual]
        target:
          type: string
          enum: [teamA, teamB, both]
        explanation:
          type: string
        provenance:
          $ref: "#/components/schemas/MatchContextModifierProvenance"
        requestedAdjustment:
          $ref: "#/components/schemas/MatchContextModifierAdjustment"
        appliedAdjustment:
          $ref: "#/components/schemas/MatchContextModifierAdjustment"
      required:
        - kind
        - target
        - explanation
        - provenance
        - requestedAdjustment
        - appliedAdjustment

    MatchContextModifierAggregate:
      type: object
      properties:
        eloDeltaA:
          type: number
        eloDeltaB:
          type: number
        xgDeltaA:
          type: number
        xgDeltaB:
          type: number
        xgMultiplierA:
          type: number
        xgMultiplierB:
          type: number
      required:
        - eloDeltaA
        - eloDeltaB
        - xgDeltaA
        - xgDeltaB
        - xgMultiplierA
        - xgMultiplierB

    MatchContextModifiersReport:
      type: object
      properties:
        enabled:
          type: boolean
        applied:
          type: array
          items:
            $ref: "#/components/schemas/AppliedMatchContextModifier"
        ignoredCount:
          type: integer
        disabledReason:
          type: string
        aggregate:
          $ref: "#/components/schemas/MatchContextModifierAggregate"
      required:
        - enabled
        - applied
        - ignoredCount
        - aggregate

    ErrorResponse:
      type: object
      properties:
        error:
          $ref: "#/components/schemas/ApiError"
      required:
        - error

    ApiError:
      type: object
      properties:
        code:
          type: string
          enum: [invalid_request, malformed_json, oracle_not_ready, match_locked, fixture_not_found, internal_error]
        message:
          type: string
        issues:
          type: array
          items:
            $ref: "#/components/schemas/ApiErrorIssue"
      required:
        - code
        - message

    ApiErrorIssue:
      type: object
      properties:
        path:
          type: string
        message:
          type: string
        code:
          type: string
      required:
        - message

    LiveMatchRequest:
      type: object
      additionalProperties: false
      properties:
        homeTeam:
          type: string
          minLength: 1
        awayTeam:
          type: string
          minLength: 1
        homeScore:
          type: integer
          minimum: 0
          maximum: 30
        awayScore:
          type: integer
          minimum: 0
          maximum: 30
      required:
        - homeTeam
        - awayTeam
        - homeScore
        - awayScore

    LiveMatchResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/LiveMatchData"
        meta:
          $ref: "#/components/schemas/OracleResponseMeta"
      required:
        - data
        - meta

    LiveMatchData:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        liveMatchesCount:
          type: integer
      required:
        - success
        - message
        - liveMatchesCount

    DeleteLiveMatchRequest:
      type: object
      additionalProperties: false
      properties:
        homeTeam:
          type: string
          minLength: 1
        awayTeam:
          type: string
          minLength: 1
      required:
        - homeTeam
        - awayTeam

    DeleteLiveMatchResult:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/DeleteLiveMatchData"
        meta:
          $ref: "#/components/schemas/OracleResponseMeta"
      required:
        - data
        - meta

    DeleteLiveMatchData:
      type: object
      properties:
        success:
          type: boolean
        liveMatchesCount:
          type: integer
      required:
        - success
        - liveMatchesCount

    PlayedMatch:
      type: object
      properties:
        matchNumber:
          type: integer
        homeTeam:
          type: string
        awayTeam:
          type: string
        homeScore:
          type: integer
        awayScore:
          type: integer
        stage:
          type: string
        source:
          type: string
          enum: [fixture, official, espn, custom]
        sourceId:
          type: string
        date:
          type: string
        kickoffTimeEt:
          type: string
        status:
          type: string
          enum: [scheduled, live, finished]
        statusDetail:
          type: string
        group:
          type: string
        venue:
          type: string
        region:
          type: string
        winnerTeam:
          type: string
      required:
        - homeTeam
        - awayTeam
        - homeScore
        - awayScore

    LiveMatchesResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/LiveMatchesData"
        meta:
          $ref: "#/components/schemas/OracleResponseMeta"
      required:
        - data
        - meta

    LiveMatchesData:
      type: object
      properties:
        playedMatches:
          type: array
          items:
            $ref: "#/components/schemas/PlayedMatch"
        source:
          $ref: "#/components/schemas/LiveMatchesSource"
      required:
        - playedMatches
        - source

    LiveMatchesSource:
      type: object
      properties:
        provider:
          type: string
          enum: [espn, disabled]
        lastSyncedAt:
          type: string
          nullable: true
        error:
          type: string
          nullable: true
      required:
        - provider
        - lastSyncedAt
        - error

    ExternalDataProviderState:
      type: string
      enum: [idle, fresh, stale, error]

    ExternalDataFallbackMode:
      type: string
      enum: [none, stale-cache, local-data]

    MatchWeatherProvenance:
      type: object
      properties:
        provider:
          type: string
          enum: [open-meteo]
        loadedAt:
          type: string
          nullable: true
        sourceUrl:
          type: string
        cacheTtlMs:
          type: integer
        stale:
          type: boolean
        error:
          type: string
          nullable: true
        state:
          $ref: "#/components/schemas/ExternalDataProviderState"
        fallback:
          $ref: "#/components/schemas/ExternalDataFallbackMode"
      required:
        - provider
        - loadedAt
        - sourceUrl
        - cacheTtlMs
        - stale
        - error
        - state
        - fallback

    MatchWeatherStatus:
      type: string
      enum: [available, unavailable]

    MatchWeatherUnavailableReason:
      type: string
      enum: [outside_forecast_horizon, venue_unavailable, provider_error, forecast_missing]

    MatchWeatherForecast:
      type: object
      properties:
        forecastTimeEt:
          type: string
        temperatureC:
          type: number
          nullable: true
        precipitationMm:
          type: number
          nullable: true
        rainMm:
          type: number
          nullable: true
        windSpeed10mKph:
          type: number
          nullable: true
        precipitationProbabilityPct:
          type: number
          nullable: true
      required:
        - forecastTimeEt
        - temperatureC
        - precipitationMm
        - rainMm
        - windSpeed10mKph
        - precipitationProbabilityPct

    MatchWeather:
      type: object
      properties:
        provider:
          type: string
          enum: [open-meteo]
        status:
          $ref: "#/components/schemas/MatchWeatherStatus"
        reason:
          allOf:
            - $ref: "#/components/schemas/MatchWeatherUnavailableReason"
          nullable: true
        forecast:
          allOf:
            - $ref: "#/components/schemas/MatchWeatherForecast"
          nullable: true
        provenance:
          $ref: "#/components/schemas/MatchWeatherProvenance"
      required:
        - provider
        - status
        - forecast
        - provenance

    MatchContextFixture:
      type: object
      properties:
        matchNumber:
          type: integer
        homeTeam:
          type: string
        awayTeam:
          type: string
        stage:
          type: string
        source:
          type: string
          enum: [fixture, official, espn, custom]
        sourceId:
          type: string
        date:
          type: string
        kickoffTimeEt:
          type: string
        status:
          type: string
          enum: [scheduled, live, finished]
        group:
          type: string
        venue:
          type: string
        region:
          type: string
      required:
        - homeTeam
        - awayTeam

    MatchContextVenue:
      type: object
      properties:
        name:
          type: string
        stadium:
          type: string
        city:
          type: string
        country:
          type: string
          enum: [Canada, Mexico, United States]
        region:
          type: string
        altitudeMeters:
          type: number
        latitude:
          type: number
        longitude:
          type: number
      required:
        - name
        - stadium
        - city
        - country
        - region
        - altitudeMeters
        - latitude
        - longitude

    MatchContextResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/MatchContextData"
        meta:
          $ref: "#/components/schemas/OracleResponseMeta"
      required:
        - data
        - meta

    MatchContextData:
      type: object
      properties:
        fixture:
          $ref: "#/components/schemas/MatchContextFixture"
        venue:
          allOf:
            - $ref: "#/components/schemas/MatchContextVenue"
          nullable: true
        weather:
          $ref: "#/components/schemas/MatchWeather"
      required:
        - fixture
        - venue
        - weather

    ClearLiveMatchesResult:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/ClearLiveMatchesData"
        meta:
          $ref: "#/components/schemas/OracleResponseMeta"
      required:
        - data
        - meta

    ClearLiveMatchesData:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message
